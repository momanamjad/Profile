<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel=stylesheet href="./styles.css">
</head>
<body id="laptopBody">
    <!-- Start Screen -->
    <div class="content startButton"> 
        <div class="flex-center h100 bg-black">
            <div class="power-button-container">
                <div class="power-button">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                        <line x1="12" y1="2" x2="12" y2="12"></line>
                    </svg>
                </div>
                <p class="power-text">Press to Start</p>
            </div>
        </div>
    </div>

    <!-- Boot Sequence -->
    <div class="content bootScreen displayHide">
        <div class="flex-center h100 bg-black">
            <div class="boot-logo-container">
                <h1 class="boot-logo">MA</h1>
                <div class="boot-progress-bar">
                    <div class="boot-progress"></div>
                </div>
                <p class="boot-status">Initializing System...</p>
            </div>
        </div>
    </div>

    <div class="content Loader displayHide">
        <div class='loader'>
            <div class="bg"></div>
            <div class='circle'></div>
            <div class='circle'></div>
            <div class='circle'></div>
            <div class='circle'></div>
            <div class='circle'></div>
        </div>
    </div>

    <!-- Desktop View -->
    <div class="content windows displayHide">
        <div class="desktop-wallpaper"></div>
        <div class="flex-left flex-col apps h100">
            <div class="desktop-grid">
                <div id="githubDiv" class="app-icon" data-app="github">
                    <img src="./assets/github.png" alt="github clone">
                    <p>GitHub Clone</p>
                </div>
                <div id="deliveryDiv" class="app-icon" data-app="delivery">
                    <img src="./assets/delivery.png" alt="food delivery">
                    <p>Delivery App</p>
                </div>
                <div id="recursionDiv" class="app-icon" data-app="recursion">
                    <img src="./assets/recursion.png" alt="Portfolio">
                    <p>Portfolio</p>
                </div>

            </div>
        </div>
        <div class="taskbar">
            <div class="start-menu-button">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"></path>
                </svg>
            </div>
            <div class="clock" id="desktop-clock">12:00 PM</div>
        </div>
    </div>




    <div class="content displayHide" id="recursionWindow">
        <div class="content iframe flex-center">
            <div class="window flex-left flex-col">
                <div class="crossbar row m-0">
                    <div class="flex-start2 col-2">
                        <p class="m-0">Portfolio</p>
                    </div>
                    <div class="flex-end offset-9 col-1 p-0">
                        <div class="crossButton pe-1 flex-center">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-lg" viewBox="0 0 16 16">
                                <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="appWindow">
                    <!-- here -->

                </div>
            </div>
        </div>
    </div>





    <script src="./script.js" defer></script>
</body>
</html>
